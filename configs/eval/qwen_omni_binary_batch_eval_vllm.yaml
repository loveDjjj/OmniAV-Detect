model_path: /data/OneDay/models/qwen/Qwen2.5-Omni-7B  # 默认基座模型路径
output_root: /data/OneDay/OmniAV-Detect/outputs/batch_eval_binary_vllm  # vLLM 批量评估输出目录
eval_backend: vllm  # 使用 vLLM 评估后端

defaults:
  torch_dtype: bfloat16  # vLLM dtype
  batch_size: 1  # vLLM 每批样本数
  fps: 1.0  # 日志中的视频采样 fps
  save_every: 100  # 每多少条样本保存一次中间预测
  fake_token_id: 52317  # Qwen tokenizer 中 Fake token id
  real_token_id: 12768  # Qwen tokenizer 中 Real token id
  use_audio_in_video: true  # 是否启用视频内音频
  max_samples:  # 小样本调试时填写整数，留空表示全量
  tensor_parallel_size: 2  # 2 卡服务器默认 2 路张量并行
  gpu_memory_utilization: 0.9  # vLLM 显存占用比例
  trust_remote_code: true  # 按 Qwen2.5-Omni 官方方式加载
  mm_format: omni_av  # 使用 qwen_omni_utils 构造 audio-video 输入
  temperature: 0.0  # logits 评估保持贪心
  top_p: 1.0  # logits 评估保持全概率
  logprobs: -1  # 返回完整词表 logprobs，用于提取 Real/Fake

runs:
  - name: stage1_to_stage2_mavosdd_encoder_full__mavosdd_test_all
    dataset: MAVOS-DD
    model_path: /data/OneDay/OmniAV-Detect/outputs/stage1_to_stage2_mavosdd_encoder_full/v0-20260503-074431/checkpoint-668  # Full checkpoint
    adapter_path:  # Full checkpoint evaluation, no LoRA adapter
    jsonl: /data/OneDay/OmniAV-Detect/data/swift_sft/mavosdd/mavosdd_binary_test_all.jsonl
    env:
      FPS_MAX_FRAMES: 64
      VIDEO_MAX_PIXELS: 25088
      MAX_PIXELS: 501760

  - name: stage2_only_fakeavceleb_encoder_full__fakeavceleb_eval
    dataset: FakeAVCeleb
    adapter_path: /data/OneDay/OmniAV-Detect/outputs/stage2_only_fakeavceleb_encoder_full/checkpoint-944  # LoRA checkpoint
    jsonl: /data/OneDay/OmniAV-Detect/data/swift_sft/fakeavceleb/fakeavceleb_binary_eval.jsonl

  - name: stage1_qwen2_5_omni_mavosdd_binary__mavosdd_test_all
    dataset: MAVOS-DD
    adapter_path: /data/OneDay/OmniAV-Detect/outputs/stage1_qwen2_5_omni_mavosdd_binary/checkpoint-668  # LoRA checkpoint
    jsonl: /data/OneDay/OmniAV-Detect/data/swift_sft/mavosdd/mavosdd_binary_test_all.jsonl
    env:
      FPS_MAX_FRAMES: 64
      VIDEO_MAX_PIXELS: 25088
      MAX_PIXELS: 501760

  - name: stage1_qwen2_5_omni_fakeavceleb_binary__fakeavceleb_eval
    dataset: FakeAVCeleb
    adapter_path: /data/OneDay/OmniAV-Detect/outputs/stage1_qwen2_5_omni_fakeavceleb_binary/checkpoint-944  # LoRA checkpoint
    jsonl: /data/OneDay/OmniAV-Detect/data/swift_sft/fakeavceleb/fakeavceleb_binary_eval.jsonl
